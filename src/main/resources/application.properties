spring.application.name=IPD-Management

# -----------------------
# IPD (Primary)
# -----------------------
spring.datasource.ipd.jdbc-url=jdbc:mysql://localhost:3306/ipd_management
spring.datasource.ipd.username=root
spring.datasource.ipd.password=root
spring.datasource.ipd.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------
# User Management (Secondary)
# -----------------------
spring.datasource.user.jdbc-url=jdbc:mysql://localhost:3306/user_managenment
spring.datasource.user.username=root
spring.datasource.user.password=root
spring.datasource.user.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------
# JPA Common
# -----------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8181
billing.service.url=http://localhost:8082/api/billing


spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=30MB